<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 998 434"
     width="998" height="434"
     role="img" aria-label="canopy logo">
  <title>canopy</title>
  <desc>canopy — a stylized green circuit-tree beside the wordmark "CANOPY" rendered in GitHub Mono, over a dark navy field with a translucent indigo block behind the wordmark.</desc>

  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&display=swap');

      /* Wordmark — GitHub Mono Bold with letter-spacing tuned for the
         visual weight in the source PNG. The fallback chain ensures the
         logo still renders well on systems without GitHub Mono installed. */
      .wordmark {
        font-family: "JetBrains Mono", "GitHub Mono", "SF Mono", ui-monospace,
                     "Cascadia Code", Menlo, Consolas, "Liberation Mono", monospace;
        font-weight: 700;
        font-size: 150px;
        letter-spacing: 8px;
        fill: #7888a8;
        fill-opacity: 0.85;
        font-feature-settings: "ss01" off;
      }

      /* Tree — bright circuit-green, evoking both a tree silhouette and a
         circuit board. Built from a vertical trunk, four left-side branches,
         four right-side branches, and perpendicular ticks on each branch. */
      .tree { fill: none; stroke: #4ade80; stroke-width: 12; stroke-linecap: square; stroke-linejoin: miter; }
    ]]></style>
  </defs>

  <!-- 1. Dark navy field -->
  <rect x="0" y="0" width="998" height="434" fill="#0e1120"/>

  <!-- 2. Translucent indigo block behind the wordmark -->
  <rect x="288" y="138" width="608" height="186" rx="3" ry="3"
        fill="#3b4a78" fill-opacity="0.78"/>

  <!-- 3. Stylized circuit-tree. Tuned so its rightmost branch tip is at
       x=240, leaving a 48px gap to the block (which starts at x=288).
       The tree's vertical extent (y=85..365) is roughly centered on
       the block's vertical extent (y=138..324). -->
  <g class="tree">
    <!-- Vertical trunk -->
    <line x1="155" y1="85"  x2="155" y2="345" />

    <!-- Top stub branches (the "Y" at the top of the trunk) -->
    <line x1="155" y1="85"  x2="172" y2="68" />
    <line x1="155" y1="85"  x2="138" y2="68" />

    <!-- Left-side horizontal branches (4, with perpendicular ticks) -->
    <line x1="155" y1="125" x2="75"  y2="125" />
    <line x1="75"  y1="125" x2="75"  y2="112" />  <!-- up -->
    <line x1="75"  y1="125" x2="75"  y2="138" />  <!-- down -->

    <line x1="155" y1="170" x2="100" y2="170" />
    <line x1="100" y1="170" x2="100" y2="157" />  <!-- up -->

    <line x1="155" y1="215" x2="50"  y2="215" />
    <line x1="50"  y1="215" x2="50"  y2="202" />  <!-- up -->

    <line x1="155" y1="260" x2="90"  y2="260" />
    <line x1="90"  y1="260" x2="90"  y2="273" />  <!-- down -->

    <!-- Right-side horizontal branches (4, with perpendicular ticks).
         Rightmost tick at x=240 — 48px gap to the block edge. -->
    <line x1="155" y1="148" x2="225" y2="148" />
    <line x1="225" y1="148" x2="225" y2="135" />  <!-- up -->

    <line x1="155" y1="193" x2="210" y2="193" />
    <line x1="210" y1="193" x2="210" y2="180" />  <!-- up -->

    <line x1="155" y1="238" x2="235" y2="238" />
    <line x1="235" y1="238" x2="235" y2="251" />  <!-- down -->

    <line x1="155" y1="283" x2="200" y2="283" />
    <line x1="200" y1="283" x2="200" y2="296" />  <!-- down -->

    <!-- Bottom stub (root tick) -->
    <line x1="155" y1="345" x2="155" y2="370" />
  </g>

  <!-- 4. Wordmark: GitHub Mono, centered on the indigo block. The block
       spans x=288..896; center=592. We center the text at x=608 (slightly
       right of geometric center) to compensate for the leftward optical
       bias from the tree sitting next to the C. Baseline at y=290 places
       the visual center of the text at ~y=220 (matches the source PNG). -->
  <text class="wordmark" x="608" y="290" text-anchor="middle">CANOPY</text>
</svg>