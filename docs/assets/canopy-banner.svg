<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 998 434"
     width="998" height="434"
     role="img"
     aria-label="canopy logo">
  <title>canopy</title>
  <desc>canopy — a stylized green circuit-tree beside the wordmark "CANOPY" rendered in GitHub Mono, over a dark navy background with a translucent indigo block behind the wordmark.</desc>

  <defs>
    <!-- GitHub Mono — embedded via @font-face won't work in inline SVG, so we
         reference the GitHub-hosted CDN. Renders crisply wherever GitHub Mono is
         installed; falls back to a generic monospace stack elsewhere. -->
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');

      .wordmark {
        font-family: "JetBrains Mono", "GitHub Mono", "SF Mono", ui-monospace,
                     "Cascadia Code", Menlo, Consolas, "Liberation Mono", monospace;
        font-weight: 700;
        font-size: 200px;
        letter-spacing: 6px;
        fill: #c5c8e6;
        opacity: 0.78;
        font-variant-ligatures: none;
      }

      .stroke-green {
        stroke: #4ade80;
        stroke-width: 14;
        stroke-linecap: square;
        stroke-linejoin: miter;
        fill: none;
      }

      .stroke-dim {
        stroke: #4ade80;
        stroke-width: 14;
        stroke-linecap: square;
        stroke-linejoin: miter;
        fill: none;
        opacity: 0.55;
      }
    ]]></style>
  </defs>

  <!-- Dark navy background -->
  <rect x="0" y="0" width="998" height="434" fill="#0b0d18"/>

  <!-- Stylized circuit-tree (bright green) — a vertical trunk with horizontal
       branches and short perpendicular ticks, suggesting both a tree and a
       circuit diagram. Coordinates hand-tuned to match the reference image. -->
  <g class="stroke-green" transform="translate(165, 80)">
    <!-- vertical trunk -->
    <line x1="80" y1="20"  x2="80" y2="280" />
    <!-- left-side horizontal branches -->
    <line x1="80" y1="60"  x2="-10" y2="60" />
    <line x1="80" y1="120" x2="20"  y2="120" />
    <line x1="80" y1="180" x2="-30" y2="180" />
    <line x1="80" y1="240" x2="10"  y2="240" />
    <!-- right-side horizontal branches -->
    <line x1="80" y1="90"  x2="170" y2="90" />
    <line x1="80" y1="150" x2="140" y2="150" />
    <line x1="80" y1="210" x2="180" y2="210" />
    <line x1="80" y1="270" x2="130" y2="270" />
    <!-- perpendicular ticks on left branches -->
    <line x1="-10" y1="50"  x2="-10" y2="70" />
    <line x1="-30" y1="170" x2="-30" y2="190" />
    <line x1="20"  y1="110" x2="20"  y2="130" />
    <line x1="10"  y1="230" x2="10"  y2="250" />
    <!-- perpendicular ticks on right branches -->
    <line x1="170" y1="80"  x2="170" y2="100" />
    <line x1="140" y1="140" x2="140" y2="160" />
    <line x1="180" y1="200" x2="180" y2="220" />
    <line x1="130" y1="260" x2="130" y2="280" />
    <!-- two short stub branches at the very top -->
    <line x1="80" y1="20" x2="100" y2="0" />
    <line x1="80" y1="20" x2="60"  y2="0" />
  </g>

  <!-- Translucent indigo block behind the wordmark -->
  <rect x="280" y="135" width="600" height="180" rx="2" ry="2"
        fill="#3b3f73" opacity="0.78" />

  <!-- "CANOPY" wordmark in GitHub Mono -->
  <text x="320" y="285" class="wordmark">CANOPY</text>
</svg>